<!DOCTYPE html>
<html class="light scroll-smooth" lang="en">

<head>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#6063ee",
                        "secondary-container": "#fd56a7",
                        "primary": "#4648d4",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#fffbff",
                        "on-surface": "#131b2e",
                        "inverse-surface": "#283044",
                        "tertiary-container": "#008096",
                        "secondary": "#b4136d",
                        "outline": "#767586"
                    },
                    fontFamily: {
                        "label-bold": ["Lexend"],
                        "headline-xl": ["Archivo"],
                        "body-lg": ["Lexend"]
                    },
                    fontSize: {
                        "label-bold": ["14px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }],
                        "headline-xl": ["48px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "600" }],
                        "body-lg": ["20px", { lineHeight: "1.6", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: #0d0b1f;
            min-height: 100vh;
        }
        .glass-nav {
            background: rgba(16, 14, 40, 0.55);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-card {
            background: rgba(18, 16, 42, 0.55);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .aura {
            filter: blur(120px);
            opacity: 0.12;
            pointer-events: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Calendar frame */
        .calendar-outer {
            padding: 3px;
            border-radius: 1.5rem;
            background: linear-gradient(135deg, rgba(96,99,238,0.5), rgba(253,86,167,0.4));
            box-shadow: 0 0 60px rgba(96,99,238,0.25), 0 32px 64px rgba(0,0,0,0.5);
        }
        .calendar-inner {
            background: #ffffff;
            border-radius: calc(1.5rem - 3px);
            overflow: hidden;
            position: relative;
        }
        .calendar-inner::before {
            display: none;
        }
    </style>
</head>

<body class="antialiased text-white">

    <!-- Background auras -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">

    <nav class="sticky top-0 z-50 flex items-center justify-between px-6 md:px-8 py-3 w-full glass-nav rounded-full mt-4 md:mt-6 mx-auto max-w-5xl shadow-[0_8px_32px_0_rgba(0,0,0,0.3)]" style="max-width:64rem; margin-left:auto; margin-right:auto;">
        <a href="index.html" class="flex items-center gap-2">

    <main class="relative z-10 px-6 py-12 md:py-20 max-w-6xl mx-auto">

                <span class="w-1.5 h-1.5 rounded-full bg-secondary-container animate-pulse inline-block"></span>
                Free · No Obligation

            <h1 class="text-4xl md:text-5xl font-bold font-['Archivo'] text-white tracking-tight mb-4 mt-4">
                Book Your <span class="text-primary-container">Discovery Call</span>

            <p class="text-white/60 text-lg font-['Lexend'] max-w-xl mx-auto">
                30 minutes. We'll map out exactly how NTNS fits your business and what results to expect.
            </p>
        </div>

        <!-- Value props row -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8 max-w-2xl mx-auto">
            <div class="glass-card rounded-xl p-4 flex items-center gap-3">
                <span class="material-symbols-outlined text-secondary-container text-xl shrink-0">check_circle</span>
                <p class="text-white/80 text-xs font-['Lexend']">Audit your lead flow</p>
            </div>
            <div class="glass-card rounded-xl p-4 flex items-center gap-3">
                <span class="material-symbols-outlined text-secondary-container text-xl shrink-0">check_circle</span>
                <p class="text-white/80 text-xs font-['Lexend']">Live AI demo</p>
            </div>
            <div class="glass-card rounded-xl p-4 flex items-center gap-3">
                <span class="material-symbols-outlined text-secondary-container text-xl shrink-0">check_circle</span>
                <p class="text-white/80 text-xs font-['Lexend']">Custom ROI estimate</p>
            </div>
            <div class="glass-card rounded-xl p-4 flex items-center gap-3">
                <span class="material-symbols-outlined text-primary-container text-xl shrink-0">schedule</span>
                <p class="text-white/80 text-xs font-['Lexend']">30 min · Free</p>
            </div>
        </div>

        <!-- Calendar centered -->
        <div class="max-w-2xl mx-auto">
            <div class="calendar-outer">
                <div class="calendar-inner">
                    <iframe
                        src="https://links.ntns.ai/widget/booking/B6pLBTkfrdXAY9q5Wv05"
                        style="width:100%; height:760px; border:none; overflow:hidden; display:block;"
                        scrolling="no"
                        id="uIzbaw0DET3MoiXoaiYc_1778152006724"
                    ></iframe>
                </div>
            </div>
        </div>

    </main>

    <script src="https://links.ntns.ai/js/form_embed.js" type="text/javascript"></script>

</body>
</html>
